<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ирина Владимирона Нагель - Преподаватель математики</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
            background-attachment: fixed;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.4);
            animation: glow 3s ease-in-out infinite;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(102, 126, 234, 0.4),
                    0 0 60px rgba(102, 126, 234, 0.2);
            }

            50% {
                box-shadow: 0 0 40px rgba(102, 126, 234, 0.6),
                    0 0 80px rgba(102, 126, 234, 0.3);
            }
        }

        .name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            animation: nameGlow 3s ease-in-out infinite;
        }

        @keyframes nameGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.3));
            }

            50% {
                filter: drop-shadow(0 0 20px rgba(240, 147, 251, 0.4));
            }
        }

        .specialization {
            font-size: 14px;
            color: #a0a0c0;
            margin-bottom: 15px;
            line-height: 1.6;
            font-weight: 500;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            margin: 25px auto;
        }

        .description {
            font-size: 13px;
            color: #c0c0d0;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(240, 147, 251, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(102, 126, 234, 0.3);
            text-decoration: none;
        }

        .social-link:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(240, 147, 251, 0.4));
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.6);
        }

        .social-link svg {
            width: 24px;
            height: 24px;
            fill: #667eea;
            transition: fill 0.3s ease;
        }

        .social-link:hover svg {
            fill: #f093fb;
        }

        .button-write {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .button-write::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .button-write:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4),
                0 0 20px rgba(240, 147, 251, 0.2);
        }

        .button-write:hover::before {
            left: 100%;
        }

        .button-write:active {
            transform: translateY(0);
        }

        .contact-info {
            font-size: 12px;
            color: #808090;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
        }

        .telegram-link {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .telegram-link:hover {
            color: #f093fb;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .name {
                font-size: 28px;
            }

            .specialization {
                font-size: 13px;
            }

            .button-write {
                width: 100%;
                padding: 14px 30px;
            }

            .social-links {
                gap: 12px;
            }

            .social-link {
                width: 45px;
                height: 45px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 25px 15px;
                border-radius: 15px;
            }

            .name {
                font-size: 24px;
            }

            .avatar {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }

            .specialization {
                font-size: 12px;
            }

            .social-link {
                width: 40px;
                height: 40px;
            }

            .social-link svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="avatar">
            <img src="photo.png" alt="Фото Ирины Нагель">
        </div>

        <h1 class="name">Ирина Нагель</h1>

        <p class="specialization">
            Преподаватель математики<br>
            6-11 классы
        </p>

        <div class="divider"></div>

        <p class="description">
            Репетиторство, разработка методических материалов и создание онлайн-школы.
            <br><br>
            <strong>Математика просто и доходчиво</strong>
        </p>

        <div class="social-links">
            <a href="https://t.me/irinanagel" class="social-link" title="Telegram" target="_blank">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.82-1.084.508l-3-2.21-1.446 1.394c-.16.16-.295.295-.605.295-.397 0-.33-.149-.465-.526l-1.06-3.471-.003-.1c0-.597.249-1.062.576-1.411 3.89-3.554 6.453-5.418 7.614-5.58.259-.032.408.024.456.15.047.126.042.365.017.72z" />
                </svg>
            </a>

            <a href="mailto:contact@example.com" class="social-link" title="Email">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                </svg>
            </a>
        </div>

        <button class="button-write" onclick="openTelegram()">
            ✓ Написать мне
        </button>

        <div class="contact-info">
            Свяжитесь со мной в <a href="https://t.me/irinanagel" class="telegram-link" target="_blank">Telegram
                @irinanagel</a>
        </div>
    </div>

    <script>
        function openTelegram() {
            window.open('https://t.me/irinanagel', '_blank');
        }

        // Добавляем эффект при наведении на кнопку
        const button = document.querySelector('.button-write');
        button.addEventListener('mouseenter', function () {
            this.style.transform = 'translateY(-2px)';
        });
        button.addEventListener('mouseleave', function () {
            this.style.transform = 'translateY(0)';
        });
    </script>
</body>

</html>
